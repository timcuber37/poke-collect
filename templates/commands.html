{% extends "base.html" %}
{% block content %}
<h1>Commands</h1>
<p style="color:#888;margin-bottom:24px;">Task-based write operations — each action publishes an event to Kafka.</p>

<!-- Add Card to Collection -->
<div class="section">
  <h2>Add Card to Collection</h2>
  <form method="post" action="/commands/add-card">
    <div class="form-group">
      <label>User</label>
      <select name="user_id" required>
        {% for u in users %}
          <option value="{{ u.user_id }}">{{ u.username }}</option>
        {% endfor %}
      </select>
    </div>
    <div class="form-group">
      <label>Card</label>
      <select name="card_id" required>
        {% for c in cards %}
          <option value="{{ c.card_id }}">{{ c.name }} — {{ c.set_name }} ({{ c.rarity }})</option>
        {% endfor %}
      </select>
    </div>
    <div class="form-group">
      <label>Condition</label>
      <select name="condition">
        <option>Mint</option>
        <option selected>Near Mint</option>
        <option>Excellent</option>
        <option>Good</option>
        <option>Poor</option>
      </select>
    </div>
    <button class="btn" type="submit">Add to Collection</button>
  </form>
</div>

{% endblock %}
